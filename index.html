function el(tag,cls,attrs,children){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  if(children){
    if(typeof children==="string")e.innerHTML=children;
    else if(Array.isArray(children))children.flat().forEach(c=>{if(c instanceof Node)e.appendChild(c);else if(c!=null&&c!==false)e.appendChild(document.createTextNode(String(c)));});
    else if(children instanceof Node)e.appendChild(children);
  }
  return e;
}

function buildWhatIf(m){
  const wrap=div("");
  const wc=div("card",{style:{border:"1px solid rgba(245,158,11,0.3)"}});
  wc.appendChild(span("section-lbl",{style:{color:"#f59e0b"}},"🔮 What If Scenarios"));
  const presets=div("whatif-presets");
  ["Agar next 2 overs wicket nahi giri?","Agar target 20 zyada hota?","Chase possible hai?","Death overs 15+ per over?"].forEach(p2=>{const b=btn("whatif-btn",{onClick:()=>runWhatIf(m,p2,wc)},p2);presets.appendChild(b);});
  wc.appendChild(presets);
  const row=div("",{style:{display:"flex",gap:"8px"}});
  const input=inp("input-field",{placeholder:"Apna scenario likho…",id:"wi-inp"});
  row.appendChild(input);
  row.appendChild(btn("btn",{style:{background:"#f59e0b",color:"#070d18",padding:"10px 14px",borderRadius:"12px"},onClick:()=>runWhatIf(m,input.value,wc)},"Ask"));
  wc.appendChild(row);
  const result=div("",{id:"wi-result"});
  wc.appendChild(result);
  wrap.appendChild(wc);
  return wrap;
}
async function runWhatIf(m,q,container){
  if(!q?.trim())return;
  const rd=container.querySelector("#wi-result")||container.appendChild(div("",{id:"wi-result"}));
  rd.innerHTML="";rd.appendChild(div("",{style:{color:"#f59e0b",fontSize:"13px",padding:"8px"}},"⏳ Calculating…"));
  try{
    const L=m.live;const ctx=L?.score?`${L.team} ${L.score} (${L.ov}ov) CRR:${L.rr} ${L.target?"Target:"+L.target+" RRR:"+L.rrr:""}`:\"Pre-match\";
    const ans=await callAI([{role:"user",content:`CricSense AI. Hinglish 3-4 lines. ${m.home} vs ${m.away} | ${m.fmt}\n${ctx}\nWhat if: "${q}"\nNumbers ke saath direct jawab do.`}],400,0.5);
    rd.innerHTML="";rd.appendChild(div("",{style:{background:"rgba(15,23,42,0.6)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:"10px",padding:"12px 14px",marginTop:"12px"}},[p("",{style:{color:"#f59e0b",fontSize:"13px",lineHeight:"1.6",margin:0}},ans)]));

}

async function sendChat(m,q){
  S.chatLoading=true;render();
  try{
    const L=m.live;const ctx=[`Match: ${m.home} vs ${m.away} | ${m.fmt}`,L?.score?`Score: ${L.team} ${L.score} (${L.ov}ov) CRR:${L.rr}`:"Pre-match",L?.target?"Target:"+L.target+" RRR:"+L.rrr:""].filter(Boolean).join(" | ");
    const sys=`CricSense AI. Hinglish (Hindi+English). 2-4 lines. Direct. Cricket betting.\n\nMatch: ${ctx}`;
    const hist=S.chatMsgs[m.id]||[];const last=hist.slice(-8);
    const api=last.map((x,i)=>({role:x.r==="user"?"user":"assistant",content:i===0?`${sys}\n\n${x.t}`:x.t}));
    const rep=await callAI(api,500,0.7);
    S.chatMsgs[m.id]=[...(S.chatMsgs[m.id]||[]),{r:"ai",t:rep||"Dobara pucho!"}];
  }catch(e){S.chatMsgs[m.id]=[...(S.chatMsgs[m.id]||[]),{r:"ai",t:"⚠️ "+e.message}];}
  S.chatLoading=false;render();
}

async function runAnalysis(){
  S.aiPhase="loading";S.ai=null;render();track("analysis_started","Match",S.selected?.home+" vs "+S.selected?.away);
  try{const r=await doAnalyze(S.selected);S.ai=r;S.aiPhase="done";
    if(r.smart_alert)showToast("⚡ "+r.smart_alert,"danger");
    else if(r.wicket_imminent)showToast("🎯 WICKET IMMINENT!","danger");
    else if(r.market_trap?.detected)showToast("🪤 Market Trap!","danger");
    else if(r.decision==="SAFE BET")showToast("✅ SAFE BET: "+r.favored_team+" · "+r.confidence+"%","bet");
    else if(r.decision==="SMALL BET")showToast("🟡 Small Bet: "+r.favored_team,"info");
  }catch(e){S.aiErr=e.message;S.aiPhase="error";}
  render();
}

function getMatches(status){return S.matches.filter(m=>m.status===status);}

async function loadData(){
  S.loading=true;S.err="";render();
  try{const m=await fetchMatches();if(!m.length){S.err="Abhi koi live match nahi mila — Demo tab mein practice karo";S.matches=[];}else{S.matches=m;const lc=m.filter(x=>x.status==="live").length;showToast(`🌐 ${m.length} matches (${lc} live)`,"success");}S.lastFetch=new Date();}catch(e){S.err="Error: "+e.message;}
  S.loading=false;render();
}

// ── Boot ──────────────────────────────────────────────────────
render();
if(S.screen==="home")loadData();
setInterval(()=>{if(S.screen==="home"&&!S.loading)loadData();},2*60*1000);

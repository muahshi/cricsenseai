<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CricSense AI — India's #1 Cricket Intelligence</title>
<meta name="description" content="AI-powered cricket predictions, live analysis & smart signals"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a0f;--bg2:#0a1520;--bg3:#0f1e2e;
  --accent:#00e5ff;--accent2:#ff6b35;--accent3:#39ff14;
  --gold:#ffd700;--red:#ff3b30;--green:#34c759;
  --text:#e8f4f8;--text2:#7ca9c0;
  --border:rgba(0,229,255,0.15);--card:rgba(10,21,32,0.95);
  --fh:'Exo 2',sans-serif;--fm:'Space Mono',monospace;--fb:'Rajdhani',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:16px;line-height:1.5;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
button{cursor:pointer;border:none;outline:none;font-family:inherit;background:none}
input,textarea{font-family:inherit;outline:none;border:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slide-in{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.anim-slide{animation:slide-in .4s ease both}
.anim-fade{animation:fade-in .5s ease both}
.anim-float{animation:float 3s ease-in-out infinite}
.spinning{animation:spin 1s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

// ══════════════════════════════════════════════════
// COLORS
// ══════════════════════════════════════════════════
const C={
  bg:"#050a0f",bg2:"#0a1520",bg3:"#0f1e2e",
  accent:"#00e5ff",accent2:"#ff6b35",accent3:"#39ff14",
  gold:"#ffd700",red:"#ff3b30",green:"#34c759",
  text:"#e8f4f8",text2:"#7ca9c0",
  border:"rgba(0,229,255,0.15)",card:"rgba(10,21,32,0.95)",
};

// ══════════════════════════════════════════════════
// API CALLS — All go to /api/ (backend handles keys)
// ══════════════════════════════════════════════════
async function apiGet(path){
  const r=await fetch(path);
  if(!r.ok) throw new Error(`API error ${r.status}`);
  return r.json();
}
async function apiPost(path,body){
  const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(`API error ${r.status}`);
  return r.json();
}

async function fetchMatches(){
  try{ const d=await apiGet("/api/predictions"); return d.data||[]; }
  catch{ return []; }
}
async function fetchAI(matchId,tab,message){
  try{
    const d=await apiPost("/api/ai",{matchId,tab,message});
    return d.result||"AI response unavailable.";
  }catch{ return "⚠️ AI engine busy hai. Thodi der baad try karo."; }
}

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
const ABBR={"Lahore Qalandars":"LQ","Karachi Kings":"KK","India":"IND","Australia":"AUS","Chennai Super Kings":"CSK","Mumbai Indians":"MI","Kolkata Knight Riders":"KKR","Royal Challengers Bangalore":"RCB","Sunrisers Hyderabad":"SRH","Delhi Capitals":"DC","Punjab Kings":"PBKS","Rajasthan Royals":"RR","Pakistan":"PAK","England":"ENG","South Africa":"SA","New Zealand":"NZ","Sri Lanka":"SL","Bangladesh":"BAN","West Indies":"WI","Afghanistan":"AFG"};
const EMOJI={"India":"🇮🇳","Australia":"🇦🇺","Pakistan":"🇵🇰","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","South Africa":"🇿🇦","New Zealand":"🇳🇿","Sri Lanka":"🇱🇰","Bangladesh":"🇧🇩","West Indies":"🏝️","Mumbai Indians":"💙","Chennai Super Kings":"💛","Royal Challengers Bangalore":"❤️","Kolkata Knight Riders":"💜","Lahore Qalandars":"🟢","Karachi Kings":"🔵"};
function abbr(n=""){ return ABBR[n]||(n.split(" ").length>=2?(n.split(" ")[0][0]+n.split(" ").slice(-1)[0][0]).toUpperCase():n.slice(0,3).toUpperCase()); }
function emoji(n){ return EMOJI[n]||"🏏"; }
function teams(m){ const p=m.name?.split(" vs ")||[]; return{t1:m.teamInfo?.[0]?.name||p[0]||"Team A",t2:m.teamInfo?.[1]?.name||p[1]||"Team B"}; }
function fmtScore(s){ if(!s?.length)return null; return s.map(x=>`${x.r}/${x.w} (${x.o} ov)`).join(" | "); }
function isLive(m){ const s=m.status?.toLowerCase()||""; return s==="live"||s==="1"||s.includes("progress"); }
function p2odds(p){ if(p<=0||p>=100)return"N/A"; return(100/p).toFixed(2); }

// ══════════════════════════════════════════════════
// COMPONENTS
// ══════════════════════════════════════════════════

function Onboarding({onDone}){
  const[step,setStep]=useState(0);
  const slides=[
    {icon:"🏏",title:"CricSense AI",sub:"India's #1 Cricket Intelligence",desc:"Real-time AI predictions, live match analysis, and smart signals — all in one place.",col:C.accent},
    {icon:"⚡",title:"Live AI Analysis",sub:"Ball-by-ball Intelligence",desc:"7 AI tabs: Ball predictions, Wicket alerts, Score forecasts, Market traps, Momentum shifts, Player stats & What If scenarios.",col:C.accent2},
    {icon:"🎯",title:"Smart Signals",sub:"LAGAI / KHAI with exact entry",desc:"AI-powered signals with live odds, win probability gauges, and market trap detection.",col:C.accent3},
  ];
  const sl=slides[step];
  return(
    <div style={{position:"fixed",inset:0,background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:9999,padding:24}}>
      <div style={{position:"absolute",inset:0,opacity:.04,backgroundImage:`linear-gradient(${C.accent} 1px,transparent 1px),linear-gradient(90deg,${C.accent} 1px,transparent 1px)`,backgroundSize:"48px 48px",pointerEvents:"none"}}/>
      <div style={{position:"relative",maxWidth:380,width:"100%",textAlign:"center"}}>
        <div className="anim-float" style={{fontSize:88,marginBottom:24,filter:`drop-shadow(0 0 24px ${sl.col})`}}>{sl.icon}</div>
        <h1 style={{fontFamily:"var(--fh)",fontSize:34,fontWeight:800,color:sl.col,textShadow:`0 0 30px ${sl.col}`,marginBottom:8}}>{sl.title}</h1>
        <p style={{fontFamily:"var(--fm)",fontSize:11,color:C.text2,letterSpacing:2,textTransform:"uppercase",marginBottom:18}}>{sl.sub}</p>
        <p style={{fontSize:17,color:C.text,lineHeight:1.65,marginBottom:40}}>{sl.desc}</p>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:32}}>
          {slides.map((_,i)=><div key={i} onClick={()=>setStep(i)} style={{width:i===step?28:8,height:8,borderRadius:4,cursor:"pointer",background:i===step?sl.col:"rgba(255,255,255,.18)",transition:"all .3s"}}/>)}
        </div>
        <button onClick={()=>step<slides.length-1?setStep(step+1):onDone()} style={{width:"100%",padding:"16px",background:`linear-gradient(135deg,${sl.col},${sl.col}99)`,color:"#000",fontSize:18,fontWeight:700,borderRadius:14,fontFamily:"var(--fh)",boxShadow:`0 0 30px ${sl.col}44`,border:`1px solid ${sl.col}`}}>
          {step<slides.length-1?"Aage Chalo →":"🚀 Shuru Karo!"}
        </button>
        {step<slides.length-1&&<button onClick={onDone} style={{marginTop:14,color:C.text2,fontSize:14}}>Skip →</button>}
      </div>
    </div>
  );
}

function LiveBadge(){
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:5,background:"rgba(255,59,48,.15)",border:"1px solid rgba(255,59,48,.5)",color:"#ff3b30",fontSize:10,fontFamily:"var(--fm)",padding:"2px 8px",borderRadius:20,letterSpacing:1}}>
      <span style={{width:6,height:6,borderRadius:"50%",background:"#ff3b30",animation:"pulse 1.2s ease infinite",boxShadow:"0 0 6px #ff3b30"}}/>
      LIVE
    </span>
  );
}

function WinGauge({prob,label,color,size=110}){
  const r=(size/2)-10,circ=2*Math.PI*r,dash=(prob/100)*circ;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={9}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={9} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 1.2s ease",filter:`drop-shadow(0 0 6px ${color})`}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:"var(--fm)",fontSize:size*.19,fontWeight:700,color,textShadow:`0 0 12px ${color}`}}>{prob}%</span>
        </div>
      </div>
      <span style={{fontSize:11,fontWeight:600,color:C.text2,textAlign:"center",maxWidth:size,lineHeight:1.3}}>{label}</span>
    </div>
  );
}

function MatchCard({match,onClick,selected}){
  const{t1,t2}=teams(match),live=isLive(match),score=fmtScore(match.score),prob=match.prob||{t1:50,t2:50};
  return(
    <div onClick={()=>onClick(match)} className="anim-slide" style={{background:selected?`linear-gradient(135deg,rgba(0,229,255,.1),rgba(0,229,255,.04))`:C.card,border:selected?`1px solid ${C.accent}`:`1px solid ${live?"rgba(255,59,48,.3)":C.border}`,borderRadius:18,padding:18,cursor:"pointer",transition:"all .3s",marginBottom:12,boxShadow:selected?`0 0 24px rgba(0,229,255,.15)`:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{fontSize:10,color:C.text2,fontFamily:"var(--fm)",letterSpacing:1}}>{match.matchType?.toUpperCase()} · {match.series?.split(" ").slice(0,3).join(" ")}</span>
        {live?<LiveBadge/>:<span style={{fontSize:10,color:C.text2,fontFamily:"var(--fm)",padding:"2px 8px",background:"rgba(255,255,255,.05)",borderRadius:20,border:"1px solid rgba(255,255,255,.1)"}}>UPCOMING</span>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:10,marginBottom:14}}>
        <div>
          <div style={{fontSize:26,marginBottom:3}}>{emoji(t1)}</div>
          <div style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:700,color:C.text}}>{abbr(t1)}</div>
          <div style={{fontSize:11,color:C.text2}}>{t1}</div>
        </div>
        <div style={{fontFamily:"var(--fm)",fontSize:11,color:C.text2,padding:"5px 10px",background:"rgba(255,255,255,.05)",borderRadius:8}}>VS</div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:26,marginBottom:3}}>{emoji(t2)}</div>
          <div style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:700,color:C.text}}>{abbr(t2)}</div>
          <div style={{fontSize:11,color:C.text2}}>{t2}</div>
        </div>
      </div>
      {score&&<div style={{fontFamily:"var(--fm)",fontSize:12,color:C.accent,background:"rgba(0,229,255,.07)",padding:"7px 12px",borderRadius:10,marginBottom:12,textAlign:"center",border:"1px solid rgba(0,229,255,.15)"}}>{score}</div>}
      {live&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:11,fontFamily:"var(--fm)"}}>
            <span style={{color:C.accent}}>{prob.t1}%</span>
            <span style={{color:C.text2,fontSize:9,letterSpacing:1}}>WIN PROB</span>
            <span style={{color:C.accent2}}>{prob.t2}%</span>
          </div>
          <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,.09)",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${prob.t1}%`,background:`linear-gradient(90deg,${C.accent},${C.accent2})`,borderRadius:3,transition:"width 1.2s ease"}}/>
          </div>
        </div>
      )}
    </div>
  );
}

// AI Panel — calls /api/ai (no keys in frontend)
const TABS=["Ball","Wicket","Score","Market","Momentum","Player","WhatIf"];
const TCOLORS={Ball:C.accent,Wicket:C.red,Score:C.accent3,Market:C.gold,Momentum:C.accent2,Player:"#a78bfa",WhatIf:"#f472b6"};
const TICONS={Ball:"⚾",Wicket:"🎯",Score:"📊",Market:"💰",Momentum:"⚡",Player:"👤",WhatIf:"🔮"};

function AIPanel({match}){
  const[tab,setTab]=useState("Ball");
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState("");
  const[inp,setInp]=useState("");
  const[chat,setChat]=useState([]);
  const col=TCOLORS[tab];

  async function analyze(){
    setLoading(true);setResult("");
    const r=await fetchAI(match.id,tab,null);
    setResult(r);setLoading(false);
  }
  async function send(){
    if(!inp.trim())return;
    const q=inp.trim();setInp("");
    setChat(h=>[...h,{r:"u",t:q}]);
    const a=await fetchAI(match.id,"chat",q);
    setChat(h=>[...h,{r:"a",t:a}]);
  }

  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,overflow:"hidden"}} className="anim-slide">
      <div style={{display:"flex",overflowX:"auto",background:C.bg2,borderBottom:`1px solid ${C.border}`,scrollbarWidth:"none"}}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>{setTab(t);setResult("");}} style={{padding:"12px 14px",flexShrink:0,background:tab===t?`${TCOLORS[t]}18`:"none",color:tab===t?TCOLORS[t]:C.text2,fontSize:12,fontWeight:600,fontFamily:"var(--fb)",borderBottom:tab===t?`2px solid ${TCOLORS[t]}`:"2px solid transparent",transition:"all .2s"}}>
            {TICONS[t]} {t}
          </button>
        ))}
      </div>
      <div style={{padding:16}}>
        <button onClick={analyze} disabled={loading} style={{width:"100%",padding:14,background:`linear-gradient(135deg,${col},${col}99)`,color:"#000",fontSize:15,fontWeight:700,borderRadius:12,fontFamily:"var(--fh)",boxShadow:`0 4px 20px ${col}30`,marginBottom:16,opacity:loading?.7:1}}>
          {loading?"🤖 AI Soch Raha Hai...":`🧠 ${tab} Analysis Karo`}
        </button>
        {result&&<div className="anim-fade" style={{background:"rgba(255,255,255,.03)",border:`1px solid ${col}25`,borderRadius:12,padding:16,marginBottom:16,fontSize:14,lineHeight:1.75,color:C.text,whiteSpace:"pre-wrap",fontFamily:"var(--fb)"}}>{result}</div>}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
          <div style={{fontSize:11,color:C.text2,marginBottom:10,fontFamily:"var(--fm)",letterSpacing:1}}>💬 MATCH CHATBOT</div>
          {chat.length>0&&(
            <div style={{maxHeight:200,overflowY:"auto",marginBottom:12,display:"flex",flexDirection:"column",gap:8}}>
              {chat.map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start"}}>
                  <div style={{maxWidth:"82%",padding:"8px 12px",borderRadius:m.r==="u"?"12px 12px 0 12px":"12px 12px 12px 0",background:m.r==="u"?"rgba(0,229,255,.12)":"rgba(255,255,255,.05)",border:`1px solid ${m.r==="u"?"rgba(0,229,255,.3)":C.border}`,fontSize:13,color:C.text,lineHeight:1.5,fontFamily:"var(--fb)"}}>{m.t}</div>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Kuch bhi pucho match ke baare mein..." style={{flex:1,padding:"10px 14px",background:"rgba(255,255,255,.05)",border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:13}}/>
            <button onClick={send} style={{padding:"10px 16px",background:C.accent,color:"#000",borderRadius:10,fontSize:16,fontWeight:700}}>→</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Market({match}){
  const prob=match.prob||{t1:50,t2:50,t1n:"Team A",t2n:"Team B"};
  const{t1,t2}=teams(match);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:16}}>
        <div style={{fontSize:11,color:C.gold,marginBottom:14,fontFamily:"var(--fm)",letterSpacing:2}}>💰 LAGAI / KHAI SIGNALS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{lbl:"LAGAI (BACK)",odds:p2odds(prob.t1),team:abbr(t1),c:C.green,sig:"✓ BUY",bg:"rgba(52,199,89,.1)",bc:"rgba(52,199,89,.3)"},
            {lbl:"KHAI (LAY)",odds:p2odds(prob.t2),team:abbr(t2),c:C.red,sig:"⚠ WAIT",bg:"rgba(255,59,48,.1)",bc:"rgba(255,59,48,.3)"}
          ].map(x=>(
            <div key={x.lbl} style={{background:x.bg,border:`1px solid ${x.bc}`,borderRadius:12,padding:14,textAlign:"center"}}>
              <div style={{fontSize:10,color:C.text2,fontFamily:"var(--fm)",letterSpacing:1,marginBottom:6}}>{x.lbl}</div>
              <div style={{fontFamily:"var(--fh)",fontSize:26,fontWeight:800,color:x.c}}>{x.odds}</div>
              <div style={{fontSize:11,color:C.text2,marginTop:2}}>{x.team}</div>
              <div style={{marginTop:8,padding:"4px 8px",background:`${x.c}22`,borderRadius:6,fontSize:11,color:x.c,fontWeight:700}}>{x.sig}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:"rgba(255,215,0,.06)",border:"1px solid rgba(255,215,0,.2)",borderRadius:14,padding:14,display:"flex",gap:10,alignItems:"center"}}>
        <span style={{fontSize:24}}>🪤</span>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:3}}>Market Trap Alert</div>
          <div style={{fontSize:12,color:C.text2}}>Odds shifting against public sentiment. Smart money favors {abbr(prob.t1>prob.t2?t1:t2)}.</div>
        </div>
      </div>
      {[{n:t1,p:prob.t1,c:C.accent},{n:t2,p:prob.t2,c:C.accent2}].map(x=>(
        <div key={x.n} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:14,color:C.text,fontFamily:"var(--fh)",fontWeight:700}}>{abbr(x.n)}</span>
            <span style={{fontSize:13,color:x.c,fontFamily:"var(--fm)"}}>{x.p}%</span>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,.08)",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${x.p}%`,background:x.c,borderRadius:4,boxShadow:`0 0 8px ${x.c}80`,transition:"width 1.5s ease"}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

function BallPred(){
  const balls=[{n:1,t:"DOT",p:28,c:C.text2},{n:2,t:"4️⃣ FOUR",p:14,c:C.accent3},{n:3,t:"WIDE",p:8,c:C.gold},{n:4,t:"1 RUN",p:31,c:C.accent},{n:5,t:"🚨 WICKET",p:11,c:C.red},{n:6,t:"6️⃣ SIX",p:8,c:C.accent2}];
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:16}}>
      <div style={{fontSize:11,color:C.accent,marginBottom:14,fontFamily:"var(--fm)",letterSpacing:2}}>⚾ NEXT 6 BALLS PREDICTION</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        {balls.map(b=>(
          <div key={b.n} style={{background:`${b.c}0d`,border:`1px solid ${b.c}30`,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontFamily:"var(--fm)",fontSize:10,color:C.text2,marginBottom:4}}>Ball {b.n}</div>
            <div style={{fontFamily:"var(--fh)",fontSize:13,fontWeight:700,color:b.c,marginBottom:2}}>{b.t}</div>
            <div style={{fontSize:11,color:C.text2,fontFamily:"var(--fm)"}}>{b.p}%</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MatchDetail({match,dtab,setDtab}){
  const{t1,t2}=teams(match),prob=match.prob||{t1:50,t2:50},score=fmtScore(match.score),live=isLive(match);
  const dtabs=["Overview","AI Analysis","Signals","Ball Pred"];
  return(
    <div className="anim-slide">
      <div style={{background:`linear-gradient(135deg,${C.bg2},${C.bg3})`,border:`1px solid ${C.border}`,borderRadius:22,padding:20,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={{fontSize:10,color:C.text2,fontFamily:"var(--fm)",letterSpacing:2,marginBottom:4}}>{match.matchType} · {match.series}</div>
            <div style={{fontSize:12,color:C.text2}}>📍 {match.venue||"TBD"}</div>
          </div>
          {live?<LiveBadge/>:<span style={{fontSize:11,color:C.text2,fontFamily:"var(--fm)"}}>UPCOMING</span>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:12,marginBottom:16}}>
          <WinGauge prob={prob.t1} label={t1} color={C.accent} size={100}/>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"var(--fm)",fontSize:11,color:C.text2,marginBottom:6}}>VS</div>
            {score&&<div style={{fontSize:10,color:C.accent,fontFamily:"var(--fm)",background:"rgba(0,229,255,.08)",padding:"4px 8px",borderRadius:6,border:"1px solid rgba(0,229,255,.2)"}}>{score}</div>}
          </div>
          <WinGauge prob={prob.t2} label={t2} color={C.accent2} size={100}/>
        </div>
        <div style={{height:7,borderRadius:4,background:"rgba(255,255,255,.08)",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${prob.t1}%`,background:`linear-gradient(90deg,${C.accent},${C.accent2})`,borderRadius:4,transition:"width 1.5s ease",boxShadow:`0 0 12px ${C.accent}60`}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
          <span style={{fontSize:10,color:C.accent,fontFamily:"var(--fm)"}}>{prob.t1}% {abbr(t1)}</span>
          <span style={{fontSize:10,color:C.accent2,fontFamily:"var(--fm)"}}>{abbr(t2)} {prob.t2}%</span>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",scrollbarWidth:"none"}}>
        {dtabs.map(t=>(
          <button key={t} onClick={()=>setDtab(t)} style={{padding:"8px 16px",flexShrink:0,background:dtab===t?C.accent:"rgba(255,255,255,.05)",color:dtab===t?"#000":C.text2,borderRadius:22,fontSize:12,fontWeight:600,fontFamily:"var(--fb)",border:`1px solid ${dtab===t?C.accent:C.border}`,transition:"all .2s"}}>{t}</button>
        ))}
      </div>
      {dtab==="Overview"&&(
        <div className="anim-slide" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:16}}>
          <div style={{fontSize:11,color:C.accent2,marginBottom:12,fontFamily:"var(--fm)",letterSpacing:2}}>📋 MATCH INFO</div>
          {[["Format",match.matchType],["Series",match.series],["Venue",match.venue||"TBD"],["Status",match.status]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:13,color:C.text2}}>{k}</span>
              <span style={{fontSize:13,color:C.text,fontWeight:600,textAlign:"right",maxWidth:"60%"}}>{v||"—"}</span>
            </div>
          ))}
        </div>
      )}
      {dtab==="AI Analysis"&&<AIPanel match={match}/>}
      {dtab==="Signals"&&<Market match={match}/>}
      {dtab==="Ball Pred"&&<BallPred match={match}/>}
    </div>
  );
}

function Header({n,onRefresh,spinning}){
  return(
    <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(5,10,15,.96)",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`,padding:"12px 16px"}}>
      <div style={{maxWidth:760,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontFamily:"var(--fh)",fontSize:21,fontWeight:800,color:C.accent,textShadow:`0 0 20px ${C.accent}60`,letterSpacing:-.5}}>
            🏏 CricSense <span style={{color:C.accent2}}>AI</span>
          </div>
          <div style={{fontFamily:"var(--fm)",fontSize:9,color:C.text2,letterSpacing:2}}>INDIA'S #1 CRICKET INTELLIGENCE</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontFamily:"var(--fm)",fontSize:10,color:C.text2,background:"rgba(255,255,255,.05)",padding:"4px 10px",borderRadius:8,border:`1px solid ${C.border}`}}>{n} matches</div>
          <button onClick={onRefresh} style={{background:"rgba(0,229,255,.1)",border:`1px solid rgba(0,229,255,.3)`,color:C.accent,padding:"7px 14px",borderRadius:9,fontSize:13,fontFamily:"var(--fb)",fontWeight:600,animation:spinning?"spin 1s linear infinite":"none"}}>⟳ Refresh</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════
function App(){
  const[ob,setOb]=useState(()=>localStorage.getItem("csob")==="1");
  const[matches,setMatches]=useState([]);
  const[loading,setLoading]=useState(true);
  const[spinning,setSpinning]=useState(false);
  const[sel,setSel]=useState(null);
  const[dtab,setDtab]=useState("Overview");
  const[mtab,setMtab]=useState("live");

  const load=useCallback(async(r=false)=>{
    r?setSpinning(true):setLoading(true);
    const m=await fetchMatches();
    setMatches(m);
    setLoading(false);setSpinning(false);
  },[]);

  useEffect(()=>{load();},[]);
  useEffect(()=>{const t=setInterval(()=>load(true),60000);return()=>clearInterval(t);},[]);

  const live=matches.filter(isLive);
  const upcoming=matches.filter(m=>!isLive(m));
  const shown=mtab==="live"?live:upcoming;

  if(!ob)return<Onboarding onDone={()=>{localStorage.setItem("csob","1");setOb(true);}}/>;

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,opacity:.025,backgroundImage:`linear-gradient(${C.accent} 1px,transparent 1px),linear-gradient(90deg,${C.accent} 1px,transparent 1px)`,backgroundSize:"56px 56px"}}/>
      <Header n={matches.length} onRefresh={()=>load(true)} spinning={spinning}/>
      <div style={{maxWidth:760,margin:"0 auto",paddingBottom:60,position:"relative",zIndex:1}}>
        <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.bg2,position:"sticky",top:61,zIndex:90}}>
          {[{id:"live",lbl:`🔴 Live (${live.length})`},{id:"upcoming",lbl:`⏰ Upcoming (${upcoming.length})`}].map(t=>(
            <button key={t.id} onClick={()=>{setMtab(t.id);setSel(null);}} style={{flex:1,padding:"13px 8px",background:mtab===t.id?"rgba(0,229,255,.07)":"none",color:mtab===t.id?C.accent:C.text2,fontSize:12,fontWeight:600,fontFamily:"var(--fb)",borderBottom:mtab===t.id?`2px solid ${C.accent}`:"2px solid transparent",transition:"all .2s"}}>{t.lbl}</button>
          ))}
        </div>
        {sel?(
          <div style={{padding:16}}>
            <button onClick={()=>setSel(null)} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.05)",border:`1px solid ${C.border}`,color:C.text2,padding:"8px 16px",borderRadius:10,fontSize:13,fontFamily:"var(--fb)",marginBottom:16}}>← Wapas</button>
            <MatchDetail match={sel} dtab={dtab} setDtab={setDtab}/>
          </div>
        ):(
          <div style={{padding:16}}>
            {loading?(
              <div style={{textAlign:"center",padding:56}}>
                <div className="spinning" style={{display:"inline-block",fontSize:44,marginBottom:16}}>🏏</div>
                <div style={{color:C.text2,fontFamily:"var(--fm)",fontSize:12}}>Loading matches...</div>
              </div>
            ):shown.length===0?(
              <div style={{textAlign:"center",padding:48,color:C.text2}}>
                <div style={{fontSize:44,marginBottom:12}}>🌙</div>
                <div>Abhi koi {mtab==="live"?"live":"upcoming"} match nahi hai.</div>
              </div>
            ):(
              shown.map(m=><MatchCard key={m.id} match={m} onClick={m=>{setSel(m);setDtab("Overview");}} selected={sel?.id===m.id}/>)
            )}
          </div>
        )}
      </div>
      <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,.18)",fontFamily:"var(--fm)",padding:"8px 0 16px",position:"fixed",bottom:0,left:0,right:0,pointerEvents:"none"}}>
        Entertainment Only · 18+ · Responsible Gambling
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CricSense AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;800&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #050a0f;
  --bg2: #0a1520;
  --bg3: #0f1e2e;
  --accent: #00e5ff;
  --accent2: #ff6b35;
  --accent3: #39ff14;
  --gold: #ffd700;
  --red: #ff3b30;
  --green: #34c759;
  --text: #e8f4f8;
  --text2: #7ca9c0;
  --border: rgba(0, 229, 255, 0.15);
  --card: rgba(10, 21, 32, 0.95);
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
button { cursor: pointer; border: none; outline: none; font-family: inherit; background: none; }
input { font-family: inherit; outline: none; border: none; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes slidein { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes spinning { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.slide { animation: slidein 0.4s ease both; }
.fade { animation: fadein 0.5s ease both; }
.float { animation: floating 3s ease-in-out infinite; }
.spin { animation: spinning 1s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useCallback } = React;

// COLORS
const C = {
  bg: "#050a0f",
  bg2: "#0a1520",
  bg3: "#0f1e2e",
  accent: "#00e5ff",
  accent2: "#ff6b35",
  accent3: "#39ff14",
  gold: "#ffd700",
  red: "#ff3b30",
  green: "#34c759",
  text: "#e8f4f8",
  text2: "#7ca9c0",
  border: "rgba(0,229,255,0.15)",
  card: "rgba(10,21,32,0.95)"
};

// API CALLS - all go to /api/ backend
async function fetchMatches() {
  try {
    const r = await fetch("/api/predictions");
    const d = await r.json();
    return d.data || [];
  } catch (e) {
    return [];
  }
}

async function fetchAI(matchId, matchName, tab, message) {
  try {
    const r = await fetch("/api/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ matchId, matchName, tab, message })
    });
    const d = await r.json();
    return d.result || "AI response unavailable.";
  } catch (e) {
    return "AI engine busy hai. Thodi der baad try karo.";
  }
}

// UTILS
const ABBR = {
  "Lahore Qalandars": "LQ", "Karachi Kings": "KK", "India": "IND",
  "Australia": "AUS", "Pakistan": "PAK", "England": "ENG",
  "Chennai Super Kings": "CSK", "Mumbai Indians": "MI",
  "Kolkata Knight Riders": "KKR", "Royal Challengers Bangalore": "RCB",
  "Sunrisers Hyderabad": "SRH", "Delhi Capitals": "DC",
  "Punjab Kings": "PBKS", "Rajasthan Royals": "RR",
  "South Africa": "SA", "New Zealand": "NZ", "Sri Lanka": "SL",
  "Bangladesh": "BAN", "West Indies": "WI", "Afghanistan": "AFG"
};

const FLAG = {
  "India": "IND", "Australia": "AUS", "Pakistan": "PAK",
  "England": "ENG", "South Africa": "SA", "New Zealand": "NZ",
  "Sri Lanka": "SL", "Bangladesh": "BAN", "West Indies": "WI"
};

function abbr(name) {
  if (!name) return "??";
  if (ABBR[name]) return ABBR[name];
  const words = name.split(" ");
  if (words.length >= 2) {
    return (words[0][0] + words[words.length - 1][0]).toUpperCase();
  }
  return name.slice(0, 3).toUpperCase();
}

function getTeams(match) {
  const parts = (match.name || "").split(" vs ");
  const t1 = (match.teamInfo && match.teamInfo[0] && match.teamInfo[0].name) || parts[0] || "Team A";
  const t2 = (match.teamInfo && match.teamInfo[1] && match.teamInfo[1].name) || parts[1] || "Team B";
  return { t1, t2 };
}

function formatScore(score) {
  if (!score || !score.length) return null;
  return score.map(function(s) { return s.r + "/" + s.w + " (" + s.o + " ov)"; }).join(" | ");
}

function isLive(match) {
  const s = (match.status || "").toLowerCase();
  return s === "live" || s === "1" || s.indexOf("progress") !== -1;
}

function calcProb(match) {
  const t = getTeams(match);
  const s = match.score && match.score[0];
  if (!s) return { t1: 50, t2: 50 };
  const mt = (match.matchType || "").toUpperCase();
  const totalOvers = mt === "T20" ? 20 : 50;
  const rr = s.o > 0 ? s.r / s.o : 0;
  const proj = s.r + rr * (totalOvers - s.o) * ((10 - s.w) / 10);
  const par = mt === "T20" ? 165 : 280;
  let p = 50 + ((proj - par) / par) * 30;
  p = Math.min(85, Math.max(15, p));
  return { t1: Math.round(p), t2: Math.round(100 - p) };
}

function toOdds(prob) {
  if (prob <= 0 || prob >= 100) return "N/A";
  return (100 / prob).toFixed(2);
}

// ONBOARDING
function Onboarding(props) {
  const [step, setStep] = useState(0);
  const slides = [
    { icon: "Cricket", emoji: "??", title: "CricSense AI", sub: "India's #1 Cricket Intelligence", desc: "Real-time AI predictions, live match analysis, and smart signals all in one place.", col: C.accent },
    { icon: "Lightning", emoji: "??", title: "Live AI Analysis", sub: "Ball-by-ball Intelligence", desc: "7 AI tabs: Ball predictions, Wicket alerts, Score forecasts, Market traps, Momentum and more.", col: C.accent2 },
    { icon: "Target", emoji: "??", title: "Smart Signals", sub: "LAGAI / KHAI with exact entry", desc: "AI-powered signals with live odds, win probability gauges, and market trap detection.", col: C.accent3 }
  ];
  const sl = slides[step];

  return (
    <div style={{ position: "fixed", inset: 0, background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999, padding: 24 }}>
      <div style={{ position: "absolute", inset: 0, opacity: 0.04, backgroundImage: "linear-gradient(" + C.accent + " 1px,transparent 1px),linear-gradient(90deg," + C.accent + " 1px,transparent 1px)", backgroundSize: "48px 48px", pointerEvents: "none" }} />
      <div style={{ position: "relative", maxWidth: 380, width: "100%", textAlign: "center" }}>
        <div className="float" style={{ fontSize: 72, marginBottom: 24, filter: "drop-shadow(0 0 20px " + sl.col + ")" }}>
          {step === 0 ? "??" : step === 1 ? "??" : "??"}
        </div>
        <h1 style={{ fontFamily: "'Exo 2', sans-serif", fontSize: 32, fontWeight: 800, color: sl.col, textShadow: "0 0 30px " + sl.col, marginBottom: 8 }}>{sl.title}</h1>
        <p style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: C.text2, letterSpacing: 2, textTransform: "uppercase", marginBottom: 16 }}>{sl.sub}</p>
        <p style={{ fontSize: 16, color: C.text, lineHeight: 1.65, marginBottom: 36 }}>{sl.desc}</p>
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 28 }}>
          {slides.map(function(_, i) {
            return (
              <div key={i} onClick={function() { setStep(i); }} style={{ width: i === step ? 28 : 8, height: 8, borderRadius: 4, cursor: "pointer", background: i === step ? sl.col : "rgba(255,255,255,0.2)", transition: "all 0.3s" }} />
            );
          })}
        </div>
        <button
          onClick={function() { if (step < slides.length - 1) { setStep(step + 1); } else { props.onDone(); } }}
          style={{ width: "100%", padding: "15px", background: "linear-gradient(135deg," + sl.col + "," + sl.col + "88)", color: "#000", fontSize: 17, fontWeight: 700, borderRadius: 14, fontFamily: "'Exo 2', sans-serif", border: "1px solid " + sl.col, boxShadow: "0 0 30px " + sl.col + "44" }}
        >
          {step < slides.length - 1 ? "Aage Chalo" : "Shuru Karo!"}
        </button>
        {step < slides.length - 1 && (
          <button onClick={props.onDone} style={{ marginTop: 14, color: C.text2, fontSize: 14 }}>Skip</button>
        )}
      </div>
    </div>
  );
}

// LIVE BADGE
function LiveBadge() {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "rgba(255,59,48,0.15)", border: "1px solid rgba(255,59,48,0.5)", color: "#ff3b30", fontSize: 10, fontFamily: "'Space Mono', monospace", padding: "2px 8px", borderRadius: 20, letterSpacing: 1 }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#ff3b30", animation: "pulse 1.2s ease infinite", boxShadow: "0 0 6px #ff3b30" }} />
      LIVE
    </span>
  );
}

// WIN GAUGE
function WinGauge(props) {
  const size = props.size || 100;
  const r = size / 2 - 10;
  const circ = 2 * Math.PI * r;
  const dash = (props.prob / 100) * circ;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
      <div style={{ position: "relative", width: size, height: size }}>
        <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={9} />
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={props.color} strokeWidth={9}
            strokeDasharray={dash + " " + circ} strokeLinecap="round"
            style={{ transition: "stroke-dasharray 1.2s ease", filter: "drop-shadow(0 0 6px " + props.color + ")" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontFamily: "'Space Mono', monospace", fontSize: Math.round(size * 0.18), fontWeight: 700, color: props.color }}>{props.prob}%</span>
        </div>
      </div>
      <span style={{ fontSize: 11, color: C.text2, textAlign: "center", maxWidth: size, lineHeight: 1.3, fontFamily: "'Rajdhani', sans-serif", fontWeight: 600 }}>{props.label}</span>
    </div>
  );
}

// MATCH CARD
function MatchCard(props) {
  const match = props.match;
  const teams = getTeams(match);
  const live = isLive(match);
  const score = formatScore(match.score);
  const prob = match.prob || calcProb(match);

  return (
    <div
      onClick={function() { props.onClick(match); }}
      className="slide"
      style={{
        background: props.selected ? "linear-gradient(135deg,rgba(0,229,255,0.1),rgba(0,229,255,0.04))" : C.card,
        border: "1px solid " + (props.selected ? C.accent : live ? "rgba(255,59,48,0.3)" : C.border),
        borderRadius: 18, padding: 18, cursor: "pointer",
        transition: "all 0.3s", marginBottom: 12,
        boxShadow: props.selected ? "0 0 24px rgba(0,229,255,0.15)" : "none"
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span style={{ fontSize: 10, color: C.text2, fontFamily: "'Space Mono', monospace", letterSpacing: 1 }}>
          {(match.matchType || "").toUpperCase()} - {(match.series || "").split(" ").slice(0, 3).join(" ")}
        </span>
        {live ? <LiveBadge /> : (
          <span style={{ fontSize: 10, color: C.text2, fontFamily: "'Space Mono', monospace", padding: "2px 8px", background: "rgba(255,255,255,0.05)", borderRadius: 20, border: "1px solid rgba(255,255,255,0.1)" }}>UPCOMING</span>
        )}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <div>
          <div style={{ fontFamily: "'Exo 2', sans-serif", fontSize: 22, fontWeight: 800, color: C.text }}>{abbr(teams.t1)}</div>
          <div style={{ fontSize: 11, color: C.text2 }}>{teams.t1}</div>
        </div>
        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: C.text2, padding: "4px 10px", background: "rgba(255,255,255,0.05)", borderRadius: 8 }}>VS</div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "'Exo 2', sans-serif", fontSize: 22, fontWeight: 800, color: C.text }}>{abbr(teams.t2)}</div>
          <div style={{ fontSize: 11, color: C.text2 }}>{teams.t2}</div>
        </div>
      </div>

      {score && (
        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: C.accent, background: "rgba(0,229,255,0.07)", padding: "7px 12px", borderRadius: 10, marginBottom: 12, textAlign: "center", border: "1px solid rgba(0,229,255,0.15)" }}>{score}</div>
      )}

      {live && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, fontSize: 11, fontFamily: "'Space Mono', monospace" }}>
            <span style={{ color: C.accent }}>{prob.t1}%</span>
            <span style={{ color: C.text2, fontSize: 9, letterSpacing: 1 }}>WIN PROB</span>
            <span style={{ color: C.accent2 }}>{prob.t2}%</span>
          </div>
          <div style={{ height: 6, borderRadius: 3, background: "rgba(255,255,255,0.09)", overflow: "hidden" }}>
            <div style={{ height: "100%", width: prob.t1 + "%", background: "linear-gradient(90deg," + C.accent + "," + C.accent2 + ")", borderRadius: 3, transition: "width 1.2s ease" }} />
          </div>
        </div>
      )}
    </div>
  );
}

// AI PANEL
const AI_TABS = ["Ball", "Wicket", "Score", "Market", "Momentum", "Player", "WhatIf"];
const TAB_COLORS = { Ball: "#00e5ff", Wicket: "#ff3b30", Score: "#39ff14", Market: "#ffd700", Momentum: "#ff6b35", Player: "#a78bfa", WhatIf: "#f472b6" };
const TAB_ICONS = { Ball: "B", Wicket: "W", Score: "S", Market: "M", Momentum: "Mo", Player: "P", WhatIf: "?" };

function AIPanel(props) {
  const match = props.match;
  const [tab, setTab] = useState("Ball");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState("");
  const [chatInput, setChatInput] = useState("");
  const [chat, setChat] = useState([]);
  const col = TAB_COLORS[tab];

  function doAnalyze() {
    setLoading(true);
    setResult("");
    const teams = getTeams(match);
    fetchAI(match.id, match.name, tab, null).then(function(r) {
      setResult(r);
      setLoading(false);
    });
  }

  function doChat() {
    if (!chatInput.trim()) return;
    const q = chatInput.trim();
    setChatInput("");
    setChat(function(h) { return h.concat([{ r: "u", t: q }]); });
    fetchAI(match.id, match.name, "chat", q).then(function(a) {
      setChat(function(h) { return h.concat([{ r: "a", t: a }]); });
    });
  }

  return (
    <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 20, overflow: "hidden" }} className="slide">
      <div style={{ display: "flex", overflowX: "auto", background: C.bg2, borderBottom: "1px solid " + C.border, scrollbarWidth: "none" }}>
        {AI_TABS.map(function(t) {
          return (
            <button key={t}
              onClick={function() { setTab(t); setResult(""); }}
              style={{ padding: "12px 14px", flexShrink: 0, background: tab === t ? TAB_COLORS[t] + "18" : "none", color: tab === t ? TAB_COLORS[t] : C.text2, fontSize: 12, fontWeight: 600, fontFamily: "'Rajdhani', sans-serif", borderBottom: "2px solid " + (tab === t ? TAB_COLORS[t] : "transparent"), transition: "all 0.2s" }}
            >
              {t}
            </button>
          );
        })}
      </div>

      <div style={{ padding: 16 }}>
        <button
          onClick={doAnalyze}
          disabled={loading}
          style={{ width: "100%", padding: 14, background: "linear-gradient(135deg," + col + "," + col + "99)", color: "#000", fontSize: 15, fontWeight: 700, borderRadius: 12, fontFamily: "'Exo 2', sans-serif", marginBottom: 16, opacity: loading ? 0.7 : 1 }}
        >
          {loading ? "AI Soch Raha Hai..." : tab + " Analysis Karo"}
        </button>

        {result !== "" && (
          <div className="fade" style={{ background: "rgba(255,255,255,0.03)", border: "1px solid " + col + "25", borderRadius: 12, padding: 16, marginBottom: 16, fontSize: 14, lineHeight: 1.75, color: C.text, whiteSpace: "pre-wrap", fontFamily: "'Rajdhani', sans-serif" }}>
            {result}
          </div>
        )}

        <div style={{ borderTop: "1px solid " + C.border, paddingTop: 14 }}>
          <div style={{ fontSize: 11, color: C.text2, marginBottom: 10, fontFamily: "'Space Mono', monospace", letterSpacing: 1 }}>MATCH CHATBOT</div>

          {chat.length > 0 && (
            <div style={{ maxHeight: 200, overflowY: "auto", marginBottom: 12, display: "flex", flexDirection: "column", gap: 8 }}>
              {chat.map(function(m, i) {
                return (
                  <div key={i} style={{ display: "flex", justifyContent: m.r === "u" ? "flex-end" : "flex-start" }}>
                    <div style={{ maxWidth: "82%", padding: "8px 12px", borderRadius: m.r === "u" ? "12px 12px 0 12px" : "12px 12px 12px 0", background: m.r === "u" ? "rgba(0,229,255,0.12)" : "rgba(255,255,255,0.05)", border: "1px solid " + (m.r === "u" ? "rgba(0,229,255,0.3)" : C.border), fontSize: 13, color: C.text, lineHeight: 1.5 }}>
                      {m.t}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div style={{ display: "flex", gap: 8 }}>
            <input
              value={chatInput}
              onChange={function(e) { setChatInput(e.target.value); }}
              onKeyDown={function(e) { if (e.key === "Enter") doChat(); }}
              placeholder="Kuch bhi pucho match ke baare mein..."
              style={{ flex: 1, padding: "10px 14px", background: "rgba(255,255,255,0.05)", border: "1px solid " + C.border, borderRadius: 10, color: C.text, fontSize: 13 }}
            />
            <button onClick={doChat} style={{ padding: "10px 16px", background: C.accent, color: "#000", borderRadius: 10, fontSize: 16, fontWeight: 700 }}>Send</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// MARKET SIGNALS
function MarketPanel(props) {
  const match = props.match;
  const teams = getTeams(match);
  const prob = match.prob || calcProb(match);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 16, padding: 16 }}>
        <div style={{ fontSize: 11, color: C.gold, marginBottom: 14, fontFamily: "'Space Mono', monospace", letterSpacing: 2 }}>LAGAI / KHAI SIGNALS</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div style={{ background: "rgba(52,199,89,0.1)", border: "1px solid rgba(52,199,89,0.3)", borderRadius: 12, padding: 14, textAlign: "center" }}>
            <div style={{ fontSize: 10, color: C.text2, fontFamily: "'Space Mono', monospace", marginBottom: 6 }}>LAGAI (BACK)</div>
            <div style={{ fontFamily: "'Exo 2', sans-serif", fontSize: 26, fontWeight: 800, color: C.green }}>{toOdds(prob.t1)}</div>
            <div style={{ fontSize: 11, color: C.text2, marginTop: 2 }}>{abbr(teams.t1)}</div>
            <div style={{ marginTop: 8, padding: "4px 8px", background: "rgba(52,199,89,0.2)", borderRadius: 6, fontSize: 11, color: C.green, fontWeight: 700 }}>BUY SIGNAL</div>
          </div>
          <div style={{ background: "rgba(255,59,48,0.1)", border: "1px solid rgba(255,59,48,0.3)", borderRadius: 12, padding: 14, textAlign: "center" }}>
            <div style={{ fontSize: 10, color: C.text2, fontFamily: "'Space Mono', monospace", marginBottom: 6 }}>KHAI (LAY)</div>
            <div style={{ fontFamily: "'Exo 2', sans-serif", fontSize: 26, fontWeight: 800, color: C.red }}>{toOdds(prob.t2)}</div>
            <div style={{ fontSize: 11, color: C.text2, marginTop: 2 }}>{abbr(teams.t2)}</div>
            <div style={{ marginTop: 8, padding: "4px 8px", background: "rgba(255,59,48,0.1)", borderRadius: 6, fontSize: 11, color: C.red, fontWeight: 700 }}>WAIT</div>
          </div>
        </div>
      </div>

      <div style={{ background: "rgba(255,215,0,0.06)", border: "1px solid rgba(255,215,0,0.2)", borderRadius: 14, padding: 14, display: "flex", gap: 10, alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.gold, marginBottom: 3 }}>Market Trap Alert</div>
          <div style={{ fontSize: 12, color: C.text2 }}>Odds shift detected. Smart money may favor {abbr(prob.t1 > prob.t2 ? teams.t1 : teams.t2)}. Avoid chasing odds.</div>
        </div>
      </div>
    </div>
  );
}

// BALL PREDICTION
function BallPanel() {
  const balls = [
    { n: 1, t: "DOT", p: 28, c: "#7ca9c0" },
    { n: 2, t: "FOUR", p: 14, c: "#39ff14" },
    { n: 3, t: "WIDE", p: 8, c: "#ffd700" },
    { n: 4, t: "1 RUN", p: 31, c: "#00e5ff" },
    { n: 5, t: "WICKET", p: 11, c: "#ff3b30" },
    { n: 6, t: "SIX", p: 8, c: "#ff6b35" }
  ];
  return (
    <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 16, padding: 16 }}>
      <div style={{ fontSize: 11, color: C.accent, marginBottom: 14, fontFamily: "'Space Mono', monospace", letterSpacing: 2 }}>NEXT 6 BALLS PREDICTION</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
        {balls.map(function(b) {
          return (
            <div key={b.n} style={{ background: b.c + "0d", border: "1px solid " + b.c + "30", borderRadius: 12, padding: "12px 8px", textAlign: "center" }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: C.text2, marginBottom: 4 }}>Ball {b.n}</div>
              <div style={{ fontFamily: "'Exo 2', sans-serif", fontSize: 13, fontWeight: 700, color: b.c, marginBottom: 2 }}>{b.t}</div>
              <div style={{ fontSize: 11, color: C.text2 }}>{b.p}%</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// MATCH DETAIL
function MatchDetail(props) {
  const match = props.match;
  const teams = getTeams(match);
  const prob = match.prob || calcProb(match);
  const score = formatScore(match.score);
  const live = isLive(match);
  const DTABS = ["Overview", "AI Analysis", "Signals", "Ball Pred"];

  return (
    <div className="slide">
      <div style={{ background: "linear-gradient(135deg," + C.bg2 + "," + C.bg3 + ")", border: "1px solid " + C.border, borderRadius: 22, padding: 20, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 10, color: C.text2, fontFamily: "'Space Mono', monospace", letterSpacing: 2, marginBottom: 4 }}>{match.matchType} - {match.series}</div>
            <div style={{ fontSize: 12, color: C.text2 }}>{match.venue || "Venue TBD"}</div>
          </div>
          {live ? <LiveBadge /> : <span style={{ fontSize: 11, color: C.text2, fontFamily: "'Space Mono', monospace" }}>UPCOMING</span>}
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 12, marginBottom: 16 }}>
          <WinGauge prob={prob.t1} label={teams.t1} color={C.accent} size={100} />
          <div style={{ textAlign: "center" }}>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: C.text2, marginBottom: 6 }}>VS</div>
            {score && (
              <div style={{ fontSize: 10, color: C.accent, fontFamily: "'Space Mono', monospace", background: "rgba(0,229,255,0.08)", padding: "4px 8px", borderRadius: 6, border: "1px solid rgba(0,229,255,0.2)" }}>{score}</div>
            )}
          </div>
          <WinGauge prob={prob.t2} label={teams.t2} color={C.accent2} size={100} />
        </div>

        <div style={{ height: 7, borderRadius: 4, background: "rgba(255,255,255,0.08)", overflow: "hidden" }}>
          <div style={{ height: "100%", width: prob.t1 + "%", background: "linear-gradient(90deg," + C.accent + "," + C.accent2 + ")", borderRadius: 4, transition: "width 1.5s ease", boxShadow: "0 0 12px " + C.accent + "60" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 5 }}>
          <span style={{ fontSize: 10, color: C.accent, fontFamily: "'Space Mono', monospace" }}>{prob.t1}% {abbr(teams.t1)}</span>
          <span style={{ fontSize: 10, color: C.accent2, fontFamily: "'Space Mono', monospace" }}>{abbr(teams.t2)} {prob.t2}%</span>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto", scrollbarWidth: "none" }}>
        {DTABS.map(function(t) {
          return (
            <button key={t}
              onClick={function() { props.setDtab(t); }}
              style={{ padding: "8px 16px", flexShrink: 0, background: props.dtab === t ? C.accent : "rgba(255,255,255,0.05)", color: props.dtab === t ? "#000" : C.text2, borderRadius: 22, fontSize: 12, fontWeight: 600, fontFamily: "'Rajdhani', sans-serif", border: "1px solid " + (props.dtab === t ? C.accent : C.border), transition: "all 0.2s" }}
            >
              {t}
            </button>
          );
        })}
      </div>

      {props.dtab === "Overview" && (
        <div className="slide" style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 16, padding: 16 }}>
          <div style={{ fontSize: 11, color: C.accent2, marginBottom: 12, fontFamily: "'Space Mono', monospace", letterSpacing: 2 }}>MATCH INFO</div>
          {[["Format", match.matchType], ["Series", match.series], ["Venue", match.venue || "TBD"], ["Status", match.status]].map(function(row) {
            return (
              <div key={row[0]} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid " + C.border }}>
                <span style={{ fontSize: 13, color: C.text2 }}>{row[0]}</span>
                <span style={{ fontSize: 13, color: C.text, fontWeight: 600, textAlign: "right", maxWidth: "60%" }}>{row[1] || "-"}</span>
              </div>
            );
          })}
        </div>
      )}

      {props.dtab === "AI Analysis" && <AIPanel match={match} />}
      {props.dtab === "Signals" && <MarketPanel match={match} />}
      {props.dtab === "Ball Pred" && <BallPanel />}
    </div>
  );
}

// HEADER
function Header(props) {
  return (
    <div style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(5,10,15,0.96)", backdropFilter: "blur(20px)", borderBottom: "1px solid " + C.border, padding: "12px 16px" }}>
      <div style={{ maxWidth: 760, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontFamily: "'Exo 2', sans-serif", fontSize: 20, fontWeight: 800, color: C.accent, letterSpacing: -0.5 }}>
            CricSense <span style={{ color: C.accent2 }}>AI</span>
          </div>
          <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 9, color: C.text2, letterSpacing: 2 }}>INDIA #1 CRICKET INTELLIGENCE</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: C.text2, background: "rgba(255,255,255,0.05)", padding: "4px 10px", borderRadius: 8, border: "1px solid " + C.border }}>
            {props.count} matches
          </div>
          <button
            onClick={props.onRefresh}
            style={{ background: "rgba(0,229,255,0.1)", border: "1px solid rgba(0,229,255,0.3)", color: C.accent, padding: "7px 14px", borderRadius: 9, fontSize: 13, fontFamily: "'Rajdhani', sans-serif", fontWeight: 600 }}
            className={props.spinning ? "spin" : ""}
          >
            Refresh
          </button>
        </div>
      </div>
    </div>
  );
}

// MAIN APP
function App() {
  const [onboarded, setOnboarded] = useState(function() {
    try { return localStorage.getItem("csob") === "1"; } catch (e) { return false; }
  });
  const [matches, setMatches] = useState([]);
  const [loading, setLoading] = useState(true);
  const [spinning, setSpinning] = useState(false);
  const [selected, setSelected] = useState(null);
  const [dtab, setDtab] = useState("Overview");
  const [mtab, setMtab] = useState("live");

  const load = useCallback(function(isRefresh) {
    if (isRefresh) { setSpinning(true); } else { setLoading(true); }
    fetchMatches().then(function(m) {
      setMatches(m);
      setLoading(false);
      setSpinning(false);
    });
  }, []);

  useEffect(function() { load(false); }, []);
  useEffect(function() {
    const t = setInterval(function() { load(true); }, 60000);
    return function() { clearInterval(t); };
  }, []);

  const liveMatches = matches.filter(isLive);
  const upcomingMatches = matches.filter(function(m) { return !isLive(m); });
  const shown = mtab === "live" ? liveMatches : upcomingMatches;

  function handleOnboard() {
    try { localStorage.setItem("csob", "1"); } catch (e) {}
    setOnboarded(true);
  }

  function handleSelect(match) {
    setSelected(match);
    setDtab("Overview");
  }

  if (!onboarded) return <Onboarding onDone={handleOnboard} />;

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0, opacity: 0.025, backgroundImage: "linear-gradient(" + C.accent + " 1px,transparent 1px),linear-gradient(90deg," + C.accent + " 1px,transparent 1px)", backgroundSize: "56px 56px" }} />

      <Header count={matches.length} onRefresh={function() { load(true); }} spinning={spinning} />

      <div style={{ maxWidth: 760, margin: "0 auto", paddingBottom: 60, position: "relative", zIndex: 1 }}>
        <div style={{ display: "flex", borderBottom: "1px solid " + C.border, background: C.bg2, position: "sticky", top: 61, zIndex: 90 }}>
          {[{ id: "live", label: "Live (" + liveMatches.length + ")" }, { id: "upcoming", label: "Upcoming (" + upcomingMatches.length + ")" }].map(function(t) {
            return (
              <button key={t.id}
                onClick={function() { setMtab(t.id); setSelected(null); }}
                style={{ flex: 1, padding: "13px 8px", background: mtab === t.id ? "rgba(0,229,255,0.07)" : "none", color: mtab === t.id ? C.accent : C.text2, fontSize: 12, fontWeight: 600, fontFamily: "'Rajdhani', sans-serif", borderBottom: "2px solid " + (mtab === t.id ? C.accent : "transparent"), transition: "all 0.2s" }}
              >
                {t.label}
              </button>
            );
          })}
        </div>

        {selected ? (
          <div style={{ padding: 16 }}>
            <button
              onClick={function() { setSelected(null); }}
              style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,0.05)", border: "1px solid " + C.border, color: C.text2, padding: "8px 16px", borderRadius: 10, fontSize: 13, fontFamily: "'Rajdhani', sans-serif", marginBottom: 16 }}
            >
              Back
            </button>
            <MatchDetail match={selected} dtab={dtab} setDtab={setDtab} />
          </div>
        ) : (
          <div style={{ padding: 16 }}>
            {loading ? (
              <div style={{ textAlign: "center", padding: 56 }}>
                <div className="spin" style={{ display: "inline-block", fontSize: 44, marginBottom: 16 }}>o</div>
                <div style={{ color: C.text2, fontFamily: "'Space Mono', monospace", fontSize: 12 }}>Loading matches...</div>
              </div>
            ) : shown.length === 0 ? (
              <div style={{ textAlign: "center", padding: 48, color: C.text2 }}>
                <div style={{ fontSize: 44, marginBottom: 12 }}>o</div>
                <div style={{ marginBottom: 6 }}>Abhi koi {mtab === "live" ? "live" : "upcoming"} match nahi hai.</div>
              </div>
            ) : (
              shown.map(function(m) {
                return <MatchCard key={m.id} match={m} onClick={handleSelect} selected={selected && selected.id === m.id} />;
              })
            )}
          </div>
        )}
      </div>

      <div style={{ textAlign: "center", fontSize: 10, color: "rgba(255,255,255,0.18)", fontFamily: "'Space Mono', monospace", padding: "8px 0 16px", position: "fixed", bottom: 0, left: 0, right: 0, pointerEvents: "none" }}>
        Entertainment Only - 18+ - Responsible Gambling
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>

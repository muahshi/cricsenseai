<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CricSense AI</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #050d14;
  color: #e2f0f7;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #00e5ff44; border-radius: 2px; }
button { cursor: pointer; border: none; outline: none; font-family: inherit; background: none; }
input, textarea { font-family: inherit; outline: none; border: none; background: none; }
@keyframes livepulse { 0%,100%{opacity:1;} 50%{opacity:.2;} }
@keyframes slidein { from{transform:translateY(12px);opacity:0;} to{transform:translateY(0);opacity:1;} }
@keyframes fadein { from{opacity:0;} to{opacity:1;} }
@keyframes spin { to{transform:rotate(360deg);} }
@keyframes slideup { from{transform:translateY(100%);} to{transform:translateY(0);} }
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
.anim { animation: slidein .35s ease both; }
.fade { animation: fadein .4s ease both; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const C = {
  bg: "#050d14", bg2: "#091520", bg3: "#0d1e2e", bg4: "#111f30",
  accent: "#00e5ff", accent2: "#ff6b35", accent3: "#39ff14",
  gold: "#ffd700", red: "#ff3b30", green: "#2ecc71",
  purple: "#8b5cf6", text: "#e2f0f7", text2: "#6a9ab8",
  border: "rgba(0,229,255,0.12)", card: "rgba(9,21,32,0.98)"
};

// ── API ──────────────────────────────────────────────────────────────
async function apiGet(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function loadMatches() {
  try { const d = await apiGet("/api/predictions"); return d.data || []; }
  catch { return []; }
}
async function askAI(matchName, matchScore, tab, msg) {
  try {
    const d = await apiPost("/api/ai", { matchName, matchScore, tab, message: msg });
    return d.result || null;
  } catch { return null; }
}

// ── UTILS ─────────────────────────────────────────────────────────────
const ABBR = {
  "Lahore Qalandars":"LQ","Karachi Kings":"KK","India":"IND","Australia":"AUS",
  "Pakistan":"PAK","England":"ENG","Chennai Super Kings":"CSK","Mumbai Indians":"MI",
  "Kolkata Knight Riders":"KKR","Royal Challengers Bangalore":"RCB",
  "Sunrisers Hyderabad":"SRH","Delhi Capitals":"DC","Punjab Kings":"PBKS",
  "Rajasthan Royals":"RR","South Africa":"SA","New Zealand":"NZ",
  "Sri Lanka":"SL","Bangladesh":"BAN","West Indies":"WI","Afghanistan":"AFG"
};
function abbr(n) {
  if (!n) return "??";
  if (ABBR[n]) return ABBR[n];
  const w = n.split(" ");
  return w.length >= 2 ? (w[0][0]+w[w.length-1][0]).toUpperCase() : n.slice(0,3).toUpperCase();
}
function getTeams(m) {
  const p = (m.name||"").split(" vs ");
  return {
    t1: m.teamInfo?.[0]?.name || p[0] || "Team A",
    t2: m.teamInfo?.[1]?.name || p[1] || "Team B"
  };
}
function fmtScore(s) {
  if (!s?.length) return null;
  return s.map(x => x.r+"/"+x.w+" ("+x.o+" ov)").join(" | ");
}
function isLive(m) {
  const s = (m.status||"").toLowerCase();
  return s==="live"||s==="1"||s.includes("progress");
}
function calcProb(m) {
  const s = m.score?.[0];
  if (!s) return { t1:50, t2:50 };
  const tot = (m.matchType||"").toUpperCase()==="T20"?20:50;
  const rr = s.o>0?s.r/s.o:0;
  const proj = s.r + rr*(tot-s.o)*((10-s.w)/10);
  const par = (m.matchType||"").toUpperCase()==="T20"?165:280;
  let p = 50+((proj-par)/par)*30;
  p = Math.min(85, Math.max(15, p));
  return { t1:Math.round(p), t2:Math.round(100-p) };
}
function calcCRR(m) {
  const s = m.score?.[0];
  if (!s||!s.o) return null;
  return (s.r/s.o).toFixed(2);
}
function calcOdds(prob) {
  if (!prob||prob<=0||prob>=100) return "N/A";
  return (100/prob).toFixed(2);
}
function recentBalls() {
  const opts = ["0","0","1","4","W","6","2","0","1","4","W","0"];
  return Array.from({length:6},()=>opts[Math.floor(Math.random()*opts.length)]);
}

// ── BALL DOT ──────────────────────────────────────────────────────────
function Ball({ v }) {
  const color = v==="W"?C.red:v==="4"?"#00e5ff":v==="6"?C.accent3:v==="0"?C.text2:C.gold;
  return (
    <div style={{
      width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
      background: v==="W"?"rgba(255,59,48,.25)":v==="4"?"rgba(0,229,255,.15)":v==="6"?"rgba(57,255,20,.15)":"rgba(255,255,255,.08)",
      border:"1px solid "+color+"55",
      fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color
    }}>{v}</div>
  );
}

// ── WIN GAUGE ─────────────────────────────────────────────────────────
function WinGauge({ prob, label, color, size=96 }) {
  const r=size/2-9, circ=2*Math.PI*r, dash=(prob/100)*circ;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth={8}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
            strokeDasharray={dash+" "+circ} strokeLinecap="round"
            style={{transition:"stroke-dasharray 1s ease",filter:"drop-shadow(0 0 5px "+color+")"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:Math.round(size*.17),fontWeight:700,color}}>{prob}%</span>
        </div>
      </div>
      <span style={{fontSize:10,color:C.text2,textAlign:"center",maxWidth:size+10,lineHeight:1.2,fontWeight:600}}>{label}</span>
    </div>
  );
}

// ── LIVE BADGE ────────────────────────────────────────────────────────
function LiveBadge() {
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(255,59,48,.15)",border:"1px solid rgba(255,59,48,.4)",color:C.red,fontSize:10,fontFamily:"'Space Mono',monospace",padding:"2px 7px",borderRadius:20,letterSpacing:1}}>
      <span style={{width:5,height:5,borderRadius:"50%",background:C.red,animation:"livepulse 1.2s ease infinite",boxShadow:"0 0 5px "+C.red}}/>
      LIVE
    </span>
  );
}

// ── MATCH CARD (list view) ────────────────────────────────────────────
function MatchCard({ match, onClick, selected }) {
  const { t1, t2 } = getTeams(match);
  const live = isLive(match);
  const score = fmtScore(match.score);
  const prob = match.prob || calcProb(match);
  const crr = calcCRR(match);
  const balls = live ? recentBalls() : null;
  const s = match.score?.[0];

  return (
    <div onClick={()=>onClick(match)} className="anim" style={{
      background: selected?"linear-gradient(135deg,rgba(0,229,255,.07),rgba(0,229,255,.02))":C.card,
      border:"1px solid "+(selected?C.accent:live?"rgba(255,59,48,.25)":C.border),
      borderRadius:16,padding:16,cursor:"pointer",marginBottom:10,
      boxShadow:selected?"0 0 20px rgba(0,229,255,.12)":"none",transition:"all .25s"
    }}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{background:live?"rgba(255,59,48,.15)":"rgba(255,255,255,.06)",border:"1px solid "+(live?"rgba(255,59,48,.3)":"rgba(255,255,255,.1)"),borderRadius:6,padding:"2px 7px",fontSize:10,fontFamily:"'Space Mono',monospace",color:live?C.red:C.text2,letterSpacing:1}}>
            {(match.matchType||"").toUpperCase()}
          </span>
          {live && <LiveBadge/>}
          {!live && <span style={{fontSize:10,color:C.text2,fontFamily:"'Space Mono',monospace",padding:"2px 7px",background:"rgba(255,255,255,.05)",borderRadius:6}}>UPCOMING</span>}
        </div>
        {score && <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:C.accent,fontWeight:700}}>{s?.r+"/"+s?.w}</span>}
      </div>

      {/* Teams row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center",marginBottom:12}}>
        <div>
          <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:17,fontWeight:700,color:C.text,lineHeight:1}}>{t1}</div>
          {live && <div style={{fontFamily:"'Space Mono',monospace",fontSize:18,fontWeight:700,color:C.green,marginTop:3}}>
            {calcOdds(prob.t1)}
          </div>}
          {live && <div style={{fontSize:10,color:C.text2}}>{prob.t1}%</div>}
        </div>
        <div style={{textAlign:"center",fontFamily:"'Space Mono',monospace",fontSize:11,color:C.text2,padding:"4px 8px",background:"rgba(255,255,255,.04)",borderRadius:7}}>VS</div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:17,fontWeight:700,color:C.text,lineHeight:1}}>{t2}</div>
          {live && <div style={{fontFamily:"'Space Mono',monospace",fontSize:18,fontWeight:700,color:C.accent2,marginTop:3}}>
            {calcOdds(prob.t2)}
          </div>}
          {live && <div style={{fontSize:10,color:C.text2}}>{prob.t2}%</div>}
        </div>
      </div>

      {/* Score bar */}
      {score && (
        <div style={{background:"rgba(0,229,255,.06)",border:"1px solid rgba(0,229,255,.1)",borderRadius:8,padding:"5px 10px",marginBottom:10,fontFamily:"'Space Mono',monospace",fontSize:11,color:C.accent,textAlign:"center"}}>
          {score} {crr && "· RR "+crr}
        </div>
      )}

      {/* Recent balls */}
      {balls && (
        <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:10,color:C.text2,fontFamily:"'Space Mono',monospace",marginRight:2}}>Recent:</span>
          {balls.map((b,i)=><Ball key={i} v={b}/>)}
          {crr && <span style={{marginLeft:"auto",fontFamily:"'Space Mono',monospace",fontSize:11,color:C.accent3,fontWeight:700}}>RR {crr}</span>}
        </div>
      )}

      {/* Win prob bar */}
      {live && (
        <div style={{height:5,borderRadius:3,background:"rgba(255,255,255,.06)",overflow:"hidden"}}>
          <div style={{height:"100%",width:prob.t1+"%",background:"linear-gradient(90deg,"+C.accent+","+C.accent2+")",borderRadius:3,transition:"width 1s ease"}}/>
        </div>
      )}
    </div>
  );
}

// ── FLOATING CHATBOT ──────────────────────────────────────────────────
function ChatBot({ match, open, onClose }) {
  const [msgs, setMsgs] = useState([]);
  const [inp, setInp] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const { t1, t2 } = getTeams(match);
  const score = fmtScore(match.score);
  const crr = calcCRR(match);

  const QUICK = ["LAGAI ya KHAI?","Wicket kab girega?","Score kitna jayega?","Collapse hoga kya?"];

  useEffect(()=>{
    if (open && msgs.length===0) {
      const greeting = match.name+" — Score "+( score||"match abhi shuru nahi")+
        (crr?", CRR "+crr:"")+
        ".\nMain is match ki full analysis kar sakta hoon — LAGAI/KHAI, wicket prediction, score projection sab! Kya jaanna hai?";
      setMsgs([{r:"ai",t:greeting}]);
    }
  },[open]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  async function send(text) {
    const q = (text||inp).trim();
    if (!q) return;
    setInp("");
    setMsgs(h=>[...h,{r:"u",t:q}]);
    setLoading(true);
    const reply = await askAI(match.name, score||"", "chat", q);
    setMsgs(h=>[...h,{r:"ai",t:reply||"AI se response nahi aaya. Dobara try karo."}]);
    setLoading(false);
  }

  if (!open) return null;

  return (
    <div style={{
      position:"fixed",bottom:0,left:0,right:0,zIndex:200,
      background:C.bg2,borderTop:"1px solid "+C.border,
      borderRadius:"20px 20px 0 0",
      boxShadow:"0 -8px 40px rgba(0,0,0,.6)",
      animation:"slideup .3s ease",
      display:"flex",flexDirection:"column",
      maxHeight:"70vh"
    }}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderBottom:"1px solid "+C.border,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,"+C.purple+","+C.accent+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
            AI
          </div>
          <div>
            <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:14,fontWeight:700,color:C.text}}>
              AI Agent <span style={{color:C.accent}}>CricSense</span>
            </div>
            <div style={{fontSize:11,color:C.text2}}>Match Expert · Hinglish</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {/* Live score pill */}
          {isLive(match) && score && (
            <div style={{background:"rgba(0,229,255,.1)",border:"1px solid rgba(0,229,255,.2)",borderRadius:20,padding:"3px 10px",fontFamily:"'Space Mono',monospace",fontSize:10,color:C.accent}}>
              {match.score?.[0]?.r+"/"+match.score?.[0]?.w} ({match.score?.[0]?.o}ov) · {crr}
            </div>
          )}
          <button onClick={onClose} style={{color:C.text2,fontSize:20,padding:4,lineHeight:1}}>x</button>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start",gap:8,alignItems:"flex-end"}}>
            {m.r==="ai" && (
              <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,"+C.purple+","+C.accent+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>AI</div>
            )}
            <div style={{
              maxWidth:"78%",padding:"10px 13px",
              borderRadius:m.r==="u"?"14px 14px 3px 14px":"14px 14px 14px 3px",
              background:m.r==="u"?"linear-gradient(135deg,"+C.purple+"cc,"+C.purple+"88)":"rgba(255,255,255,.06)",
              border:"1px solid "+(m.r==="u"?C.purple+"44":C.border),
              fontSize:13,color:C.text,lineHeight:1.55,whiteSpace:"pre-wrap"
            }}>{m.t}</div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,"+C.purple+","+C.accent+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>AI</div>
            <div style={{padding:"10px 14px",background:"rgba(255,255,255,.06)",border:"1px solid "+C.border,borderRadius:"14px 14px 14px 3px",display:"flex",gap:4}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.text2,animation:"livepulse 1.2s ease infinite",animationDelay:(i*.2)+"s"}}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Quick replies */}
      <div style={{padding:"8px 16px",display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none",flexShrink:0}}>
        {QUICK.map(q=>(
          <button key={q} onClick={()=>send(q)} style={{
            flexShrink:0,padding:"6px 12px",background:"rgba(255,255,255,.06)",
            border:"1px solid "+C.border,borderRadius:20,fontSize:12,color:C.text2,
            whiteSpace:"nowrap",transition:"all .2s"
          }}>{q}</button>
        ))}
      </div>

      {/* Input */}
      <div style={{padding:"10px 16px 16px",flexShrink:0}}>
        <div style={{display:"flex",gap:8,background:"rgba(255,255,255,.05)",border:"1px solid "+C.border,borderRadius:12,padding:"8px 12px",alignItems:"center"}}>
          <input
            value={inp}
            onChange={e=>setInp(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&send()}
            placeholder="Kuch bhi pucho..."
            style={{flex:1,color:C.text,fontSize:14}}
          />
          <button onClick={()=>send()} style={{
            width:34,height:34,borderRadius:"50%",
            background:inp.trim()?"linear-gradient(135deg,"+C.purple+","+C.accent+")":"rgba(255,255,255,.1)",
            color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",
            transition:"all .2s",flexShrink:0
          }}>-></button>
        </div>
      </div>
    </div>
  );
}

// ── MATCH DETAIL PAGE ─────────────────────────────────────────────────
function MatchPage({ match, onBack }) {
  const { t1, t2 } = getTeams(match);
  const prob = match.prob || calcProb(match);
  const score = fmtScore(match.score);
  const live = isLive(match);
  const crr = calcCRR(match);
  const s = match.score?.[0];
  const balls = live ? recentBalls() : null;
  const [chatOpen, setChatOpen] = useState(false);
  const [aiResult, setAiResult] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [dtab, setDtab] = useState("Overview");

  // Required runs calc
  const totalOvers = (match.matchType||"").toUpperCase()==="T20"?20:50;
  const oversLeft = s ? (totalOvers - s.o).toFixed(1) : null;

  async function doAnalysis() {
    setAiLoading(true);
    setAiResult("");
    const r = await askAI(match.name, score||"not started", "full", null);
    setAiResult(r || "Ball-by-ball analysis:\nBall 1: Dot - 28%\nBall 2: Single - 30%\nBall 3: Four - 14%\nBall 4: Wicket - 11%\nBall 5: Two - 18%\nBall 6: Six - 8%\n\nCurrent RR 8.2 vs req 8.5. Pressure building.");
    setAiLoading(false);
  }

  const DTABS = ["Overview","Signals","Ball Pred"];

  return (
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:chatOpen?0:80}}>
      {/* Top bar */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(5,13,20,.97)",backdropFilter:"blur(16px)",borderBottom:"1px solid "+C.border,padding:"10px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,.07)",border:"1px solid "+C.border,color:C.text2,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
            &lt;
          </button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{match.name}</div>
            <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
              <span style={{background:"rgba(255,255,255,.07)",borderRadius:5,padding:"1px 6px",fontSize:10,color:C.text2}}>{match.matchType}</span>
              {live && <LiveBadge/>}
            </div>
          </div>
          {score && (
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:18,fontWeight:800,color:C.text}}>{s?.r+"/"+s?.w}</div>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:C.accent}}>{s?.o}ov · {crr}</div>
            </div>
          )}
        </div>
      </div>

      <div style={{padding:"0 0 16px",maxWidth:760,margin:"0 auto"}}>
        {/* Score card */}
        <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:16,marginBottom:8}}>
          <div style={{fontSize:11,color:C.text2,marginBottom:10}}>{match.series}</div>

          {/* Win gauges */}
          <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:10,marginBottom:14}}>
            <WinGauge prob={prob.t1} label={t1} color={C.accent} size={96}/>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:C.text2,marginBottom:6}}>VS</div>
              {score && <div style={{background:"rgba(0,229,255,.08)",border:"1px solid rgba(0,229,255,.15)",borderRadius:8,padding:"4px 8px",fontFamily:"'Space Mono',monospace",fontSize:10,color:C.accent,whiteSpace:"nowrap"}}>{score}</div>}
            </div>
            <WinGauge prob={prob.t2} label={t2} color={C.accent2} size={96}/>
          </div>

          {/* CRR / RRR */}
          {s && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <div style={{background:"rgba(0,229,255,.06)",border:"1px solid rgba(0,229,255,.1)",borderRadius:10,padding:10,textAlign:"center"}}>
                <div style={{fontSize:10,color:C.text2,fontFamily:"'Space Mono',monospace",marginBottom:3}}>CRR</div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:20,fontWeight:700,color:C.accent}}>{crr}</div>
              </div>
              <div style={{background:"rgba(255,107,53,.06)",border:"1px solid rgba(255,107,53,.1)",borderRadius:10,padding:10,textAlign:"center"}}>
                <div style={{fontSize:10,color:C.text2,fontFamily:"'Space Mono',monospace",marginBottom:3}}>OVERS LEFT</div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:20,fontWeight:700,color:C.accent2}}>{oversLeft}</div>
              </div>
            </div>
          )}

          {/* Recent balls */}
          {balls && (
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:C.text2,fontFamily:"'Space Mono',monospace",marginBottom:6,letterSpacing:1}}>LAST 6 BALLS</div>
              <div style={{display:"flex",gap:6}}>{balls.map((b,i)=><Ball key={i} v={b}/>)}</div>
            </div>
          )}

          {/* Win prob bar */}
          <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,.07)",overflow:"hidden"}}>
            <div style={{height:"100%",width:prob.t1+"%",background:"linear-gradient(90deg,"+C.accent+","+C.accent2+")",borderRadius:3,transition:"width 1.2s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <span style={{fontSize:10,color:C.accent,fontFamily:"'Space Mono',monospace"}}>{prob.t1}% {abbr(t1)}</span>
            <span style={{fontSize:10,color:C.accent2,fontFamily:"'Space Mono',monospace"}}>{abbr(t2)} {prob.t2}%</span>
          </div>
        </div>

        {/* ODDS CARD */}
        <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:16,marginBottom:8}}>
          <div style={{fontSize:10,color:C.text2,fontFamily:"'Space Mono',monospace",letterSpacing:2,marginBottom:12}}>LAGAI / KHAI</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{n:t1,odds:calcOdds(prob.t1),prob:prob.t1,c:C.green,lbl:"LAGAI"},{n:t2,odds:calcOdds(prob.t2),prob:prob.t2,c:C.accent2,lbl:"KHAI"}].map(x=>(
              <div key={x.n} style={{background:"rgba(255,255,255,.04)",border:"1px solid "+x.c+"22",borderRadius:12,padding:12,textAlign:"center"}}>
                <div style={{fontSize:10,color:C.text2,fontFamily:"'Space Mono',monospace",marginBottom:4}}>{x.lbl}</div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:26,fontWeight:700,color:x.c}}>{x.odds}</div>
                <div style={{fontSize:11,color:C.text2,marginTop:2}}>{abbr(x.n)} · {x.prob}%</div>
              </div>
            ))}
          </div>
        </div>

        {/* Sub-tabs */}
        <div style={{display:"flex",borderBottom:"1px solid "+C.border,background:C.bg2,marginBottom:8}}>
          {DTABS.map(t=>(
            <button key={t} onClick={()=>setDtab(t)} style={{
              flex:1,padding:"12px 0",
              background:dtab===t?"rgba(0,229,255,.07)":"none",
              color:dtab===t?C.accent:C.text2,fontSize:12,fontWeight:600,
              borderBottom:"2px solid "+(dtab===t?C.accent:"transparent"),transition:"all .2s"
            }}>{t}</button>
          ))}
        </div>

        <div style={{padding:"0 16px"}}>
          {/* Overview */}
          {dtab==="Overview" && (
            <div className="anim">
              <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:16,marginBottom:10}}>
                <div style={{fontSize:10,color:C.accent2,fontFamily:"'Space Mono',monospace",letterSpacing:2,marginBottom:12}}>MATCH INFO</div>
                {[["Format",match.matchType],["Series",match.series],["Venue",match.venue||"TBD"],["Status",match.status]].map(([k,v])=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}>
                    <span style={{fontSize:13,color:C.text2}}>{k}</span>
                    <span style={{fontSize:13,color:C.text,fontWeight:600,maxWidth:"60%",textAlign:"right"}}>{v||"-"}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Signals */}
          {dtab==="Signals" && (
            <div className="anim" style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{background:"rgba(255,215,0,.06)",border:"1px solid rgba(255,215,0,.2)",borderRadius:14,padding:14}}>
                <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:4}}>Market Trap Alert</div>
                <div style={{fontSize:12,color:C.text2}}>Odds shift detected. Smart money may favor {prob.t1>prob.t2?abbr(t1):abbr(t2)}. Avoid chasing odds at current levels.</div>
              </div>
              {[
                {lbl:"Wicket Probability Next 3 Overs",val:"38%",c:C.red},
                {lbl:"Score Projection",val:(match.matchType||"").toUpperCase()==="T20"?"165-175":"270-290",c:C.accent3},
                {lbl:"Momentum",val:prob.t1>prob.t2?abbr(t1)+" leading":abbr(t2)+" leading",c:C.accent}
              ].map(x=>(
                <div key={x.lbl} style={{background:"rgba(255,255,255,.03)",border:"1px solid "+C.border,borderRadius:12,padding:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,color:C.text2}}>{x.lbl}</span>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:14,fontWeight:700,color:x.c}}>{x.val}</span>
                </div>
              ))}
            </div>
          )}

          {/* Ball Pred */}
          {dtab==="Ball Pred" && (
            <div className="anim">
              <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:16,marginBottom:10}}>
                <div style={{fontSize:10,color:C.accent,fontFamily:"'Space Mono',monospace",letterSpacing:2,marginBottom:12}}>NEXT 6 BALLS</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {[{n:1,t:"DOT",p:28,c:C.text2},{n:2,t:"FOUR",p:14,c:C.accent},{n:3,t:"WIDE",p:8,c:C.gold},{n:4,t:"1 RUN",p:31,c:"#7ca9c0"},{n:5,t:"WICKET",p:11,c:C.red},{n:6,t:"SIX",p:8,c:C.accent3}].map(b=>(
                    <div key={b.n} style={{background:b.c+"0d",border:"1px solid "+b.c+"28",borderRadius:11,padding:"11px 7px",textAlign:"center"}}>
                      <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:C.text2,marginBottom:3}}>Ball {b.n}</div>
                      <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:13,fontWeight:700,color:b.c,marginBottom:1}}>{b.t}</div>
                      <div style={{fontSize:11,color:C.text2}}>{b.p}%</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>

        {/* CricSense AI card */}
        <div style={{margin:"16px 16px 0",background:"linear-gradient(135deg,rgba(139,92,246,.15),rgba(0,229,255,.08))",border:"1px solid rgba(139,92,246,.3)",borderRadius:16,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:aiResult?12:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:20}}>AI</span>
              <span style={{fontFamily:"'Exo 2',sans-serif",fontSize:13,fontWeight:700,color:C.accent,letterSpacing:1}}>CRICSENSE AI</span>
            </div>
            <button onClick={doAnalysis} disabled={aiLoading} style={{
              padding:"8px 16px",background:"linear-gradient(135deg,"+C.purple+","+C.accent+")",
              color:"#fff",borderRadius:20,fontSize:12,fontWeight:700,
              fontFamily:"'Exo 2',sans-serif",opacity:aiLoading?.7:1,display:"flex",alignItems:"center",gap:6
            }}>
              {aiLoading ? (
                <><div style={{width:12,height:12,border:"2px solid #fff3",borderTop:"2px solid #fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>Analyzing...</>
              ) : "Analysis Shuru Karo"}
            </button>
          </div>
          {aiResult && (
            <div className="fade" style={{fontSize:13,color:C.text,lineHeight:1.7,whiteSpace:"pre-wrap",borderTop:"1px solid rgba(255,255,255,.08)",paddingTop:12}}>
              {aiResult}
            </div>
          )}
          {!aiResult && !aiLoading && (
            <div style={{fontSize:12,color:C.text2,marginTop:8}}>Upar "Analysis Shuru Karo" dabao</div>
          )}
        </div>
      </div>

      {/* Floating chat button */}
      {!chatOpen && (
        <button onClick={()=>setChatOpen(true)} style={{
          position:"fixed",bottom:20,right:20,zIndex:100,
          width:56,height:56,borderRadius:"50%",
          background:"linear-gradient(135deg,"+C.purple+","+C.accent+")",
          boxShadow:"0 4px 20px "+C.purple+"60",
          fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",
          border:"none",color:"#fff"
        }}>AI</button>
      )}

      {/* Chat overlay */}
      {chatOpen && (
        <>
          <div onClick={()=>setChatOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:199}}/>
          <ChatBot match={match} open={chatOpen} onClose={()=>setChatOpen(false)}/>
        </>
      )}
    </div>
  );
}

// ── HEADER ────────────────────────────────────────────────────────────
function Header({ count, onRefresh, spinning }) {
  return (
    <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(5,13,20,.97)",backdropFilter:"blur(16px)",borderBottom:"1px solid "+C.border,padding:"10px 16px"}}>
      <div style={{maxWidth:760,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:20,fontWeight:800,color:C.accent,letterSpacing:-.5}}>
            CricSense <span style={{color:C.accent2}}>AI</span>
          </div>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:C.text2,letterSpacing:2}}>INDIA #1 CRICKET INTELLIGENCE</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:C.text2,background:"rgba(255,255,255,.05)",padding:"4px 9px",borderRadius:7,border:"1px solid "+C.border}}>{count} matches</div>
          <button onClick={onRefresh} style={{background:"rgba(0,229,255,.1)",border:"1px solid rgba(0,229,255,.25)",color:C.accent,padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
            <span style={{display:"inline-block",animation:spinning?"spin 1s linear infinite":"none"}}>o</span> Refresh
          </button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────
function App() {
  const [ob, setOb] = useState(()=>{ try{return localStorage.getItem("csob2")==="1";}catch{return false;} });
  const [obStep, setObStep] = useState(0);
  const [matches, setMatches] = useState([]);
  const [loading, setLoading] = useState(true);
  const [spinning, setSpinning] = useState(false);
  const [selected, setSelected] = useState(null);
  const [mtab, setMtab] = useState("live");

  const load = useCallback(async (isR=false) => {
    isR ? setSpinning(true) : setLoading(true);
    const m = await loadMatches();
    setMatches(m);
    setLoading(false);
    setSpinning(false);
  }, []);

  useEffect(()=>{ load(); },[]);
  useEffect(()=>{ const t=setInterval(()=>load(true),60000); return()=>clearInterval(t); },[]);

  const live = matches.filter(isLive);
  const upcoming = matches.filter(m=>!isLive(m));
  const shown = mtab==="live" ? live : upcoming;

  function doneOb() { try{localStorage.setItem("csob2","1");}catch{} setOb(true); }

  // ONBOARDING
  if (!ob) {
    const slides = [
      { title:"CricSense AI", sub:"India's #1 Cricket Intelligence", desc:"Real-time AI predictions, live match analysis, and smart signals all in one place.", col:C.accent },
      { title:"Live AI Analysis", sub:"Ball-by-ball Intelligence", desc:"7 AI tabs: Ball predictions, Wicket alerts, Score forecasts, Market traps, Momentum and more.", col:C.accent2 },
      { title:"Smart Signals", sub:"LAGAI / KHAI with exact entry", desc:"AI-powered signals with live odds, win probability gauges, and market trap detection.", col:C.accent3 }
    ];
    const sl = slides[obStep];
    const icons = [
      <svg width="72" height="72" viewBox="0 0 80 80" fill="none"><ellipse cx="40" cy="40" rx="36" ry="12" stroke={sl.col} strokeWidth="2.5" fill="none" transform="rotate(-35 40 40)"/><circle cx="40" cy="40" r="35" stroke={sl.col} strokeWidth="2" fill="none" opacity="0.2"/><line x1="12" y1="55" x2="68" y2="25" stroke={sl.col} strokeWidth="3" strokeLinecap="round"/><circle cx="40" cy="40" r="7" fill={sl.col}/></svg>,
      <svg width="72" height="72" viewBox="0 0 80 80" fill="none"><polygon points="40,6 50,30 76,30 55,50 63,76 40,58 17,76 25,50 4,30 30,30" fill={sl.col} opacity="0.9"/></svg>,
      <svg width="72" height="72" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="32" stroke={sl.col} strokeWidth="2.5" fill="none"/><circle cx="40" cy="40" r="18" stroke={sl.col} strokeWidth="2" fill="none" opacity="0.6"/><circle cx="40" cy="40" r="7" fill={sl.col}/><line x1="40" y1="4" x2="40" y2="16" stroke={sl.col} strokeWidth="3" strokeLinecap="round"/><line x1="40" y1="64" x2="40" y2="76" stroke={sl.col} strokeWidth="3" strokeLinecap="round"/><line x1="4" y1="40" x2="16" y2="40" stroke={sl.col} strokeWidth="3" strokeLinecap="round"/><line x1="64" y1="40" x2="76" y2="40" stroke={sl.col} strokeWidth="3" strokeLinecap="round"/></svg>
    ];
    return (
      <div style={{position:"fixed",inset:0,background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:24}}>
        <div style={{position:"absolute",inset:0,opacity:.04,backgroundImage:"linear-gradient("+C.accent+" 1px,transparent 1px),linear-gradient(90deg,"+C.accent+" 1px,transparent 1px)",backgroundSize:"48px 48px",pointerEvents:"none"}}/>
        <div style={{position:"relative",maxWidth:380,width:"100%",textAlign:"center"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:24,animation:"float 3s ease-in-out infinite",filter:"drop-shadow(0 0 20px "+sl.col+")"}}>{icons[obStep]}</div>
          <h1 style={{fontFamily:"'Exo 2',sans-serif",fontSize:32,fontWeight:800,color:sl.col,textShadow:"0 0 30px "+sl.col,marginBottom:8}}>{sl.title}</h1>
          <p style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:C.text2,letterSpacing:2,textTransform:"uppercase",marginBottom:16}}>{sl.sub}</p>
          <p style={{fontSize:16,color:C.text,lineHeight:1.65,marginBottom:36}}>{sl.desc}</p>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:28}}>
            {slides.map((_,i)=><div key={i} onClick={()=>setObStep(i)} style={{width:i===obStep?28:8,height:8,borderRadius:4,cursor:"pointer",background:i===obStep?sl.col:"rgba(255,255,255,.2)",transition:"all .3s"}}/>)}
          </div>
          <button onClick={()=>obStep<slides.length-1?setObStep(obStep+1):doneOb()} style={{width:"100%",padding:"15px",background:"linear-gradient(135deg,"+sl.col+","+sl.col+"88)",color:"#000",fontSize:17,fontWeight:700,borderRadius:14,fontFamily:"'Exo 2',sans-serif",border:"1px solid "+sl.col}}>
            {obStep<slides.length-1?"Aage Chalo":"Shuru Karo!"}
          </button>
          {obStep<slides.length-1&&<button onClick={doneOb} style={{marginTop:14,color:C.text2,fontSize:14}}>Skip</button>}
        </div>
      </div>
    );
  }

  // MATCH DETAIL
  if (selected) {
    return <MatchPage match={selected} onBack={()=>setSelected(null)}/>;
  }

  // MATCH LIST
  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,opacity:.02,backgroundImage:"linear-gradient("+C.accent+" 1px,transparent 1px),linear-gradient(90deg,"+C.accent+" 1px,transparent 1px)",backgroundSize:"56px 56px"}}/>
      <Header count={matches.length} onRefresh={()=>load(true)} spinning={spinning}/>
      <div style={{maxWidth:760,margin:"0 auto",position:"relative",zIndex:1,paddingBottom:40}}>
        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid "+C.border,background:C.bg2,position:"sticky",top:61,zIndex:90}}>
          {[{id:"live",lbl:"Live ("+live.length+")"},{id:"upcoming",lbl:"Upcoming ("+upcoming.length+")"}].map(t=>(
            <button key={t.id} onClick={()=>setMtab(t.id)} style={{
              flex:1,padding:"13px 0",
              background:mtab===t.id?"rgba(0,229,255,.07)":"none",
              color:mtab===t.id?C.accent:C.text2,
              fontSize:12,fontWeight:600,fontFamily:"'Rajdhani',sans-serif",
              borderBottom:"2px solid "+(mtab===t.id?C.accent:"transparent"),transition:"all .2s"
            }}>{t.lbl}</button>
          ))}
        </div>

        <div style={{padding:14}}>
          {loading ? (
            <div style={{textAlign:"center",padding:56}}>
              <div style={{width:44,height:44,border:"4px solid rgba(0,229,255,.15)",borderTop:"4px solid "+C.accent,borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 16px"}}/>
              <div style={{color:C.text2,fontFamily:"'Space Mono',monospace",fontSize:12}}>Loading matches...</div>
            </div>
          ) : shown.length===0 ? (
            <div style={{textAlign:"center",padding:48,color:C.text2}}>
              <div style={{fontSize:40,marginBottom:12}}>00</div>
              <div>Koi {mtab==="live"?"live":"upcoming"} match nahi hai abhi.</div>
            </div>
          ) : (
            shown.map(m=><MatchCard key={m.id} match={m} onClick={m=>{setSelected(m);}} selected={false}/>)
          )}
        </div>
      </div>
      <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,.15)",fontFamily:"'Space Mono',monospace",padding:"0 0 12px",position:"fixed",bottom:0,left:0,right:0,pointerEvents:"none"}}>
        Entertainment Only - 18+ - Responsible Gambling
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
